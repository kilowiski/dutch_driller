<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ lang.name }} Driller{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/?lang={{ lang_code }}" class="logo">{{ lang.flag }} {{ lang.name }} Driller</a>
        <div class="nav-links">
            <a href="/vocab?lang={{ lang_code }}">Vocabulary</a>
            <a href="/phrases?lang={{ lang_code }}">Phrases</a>
            <a href="/conjugate?lang={{ lang_code }}">Conjugation</a>
            <a href="/sentences?lang={{ lang_code }}">Sentences</a>
            <a href="/stats?lang={{ lang_code }}">Stats</a>
            <a href="/data?lang={{ lang_code }}">Data</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
